spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cine_db?createDatabaseIfNotExist=true
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:  # ← Agrega esta línea
      ddl-auto: update  # ← Ahora está dentro de hibernate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    show-common-extensions: true
    show-extensions: true
  use-fqn: true
